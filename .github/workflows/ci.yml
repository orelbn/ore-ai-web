name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare Wrangler config
        run: cp wrangler.jsonc.example wrangler.jsonc

      - name: Check
        run: bun x vp check

      - name: Test
        run: bun x vp test

      - name: Build
        run: bun x vp build
