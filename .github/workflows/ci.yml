name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      ORE_AI_MCP_PATH: ${{ github.workspace }}/ore-ai-mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout ore-ai-mcp
        uses: actions/checkout@v4
        with:
          repository: orelbn/ore-ai-mcp
          path: ore-ai-mcp

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Prepare Wrangler config
        run: cp wrangler.jsonc.example wrangler.jsonc

      - name: Check
        run: vp check

      - name: Test
        run: vp test

      - name: Build
        run: vp build
